name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
    # Avoid burning minutes on docs or local-only changes.
    paths-ignore:
      - "README.md"
      - "**/*.md"
      - ".gitignore"
      - "miniapp/**"
      - ".tools/**"
      - ".chrome-profile/**"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # `npm ci` is deterministic + faster (uses package-lock.json).
      # `--no-audit/--no-fund` cuts extra network calls.
      - run: npm ci --no-audit --no-fund

      - run: npm run build
        env:
          VITE_BASE: "/${{ github.event.repository.name }}/"

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
